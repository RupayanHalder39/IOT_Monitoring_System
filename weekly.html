<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Report</title>
  <script src="http://localhost:4115/config.js"></script>
  <link rel="stylesheet" href="./weeklystyle.css" />
  <script>
    if (!window.__DEV_MODE__) {
      const iconLink = document.createElement('link');
      iconLink.rel = 'stylesheet';
      iconLink.href = 'https://fonts.googleapis.com/icon?family=Material+Symbols+Sharp';
      document.head.appendChild(iconLink);
    }
  </script>
  <link rel="stylesheet" href="./weeklystyle.css" />
  <style>
    .container {
      display: flex;
      justify-content: space-between;
      margin-left: 40px;
      /* Adjust the left margin */
      margin-right: 40px;
      /* Adjust the right margin */
    }

    .box {
      width: 30%;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <main>
    <h1>
      <center>Weekly Report</center>
    </h1>
    <div class="container" id="weekly-container">
      <!-- Boxes will be dynamically generated here -->
    </div>
  </main>

  <script>
    window.onload = function () {
      const container = document.getElementById('weekly-container');
      const API_BASE = window.__API_BASE_URL__ || 'http://localhost:4115';
      const params = new URLSearchParams(window.location.search);
      const room = params.get('room') || 'room1';

      function renderBox(roomData) {
        const box = document.createElement('div');
        box.classList.add('box');
        const formattedDate = formatDate(new Date(roomData.day));
        box.innerHTML = `
          <h2>
            <center>${formattedDate}</center>
          </h2>
          <div class="insights">
            <div class="temperature">
              <div class="middle">
                <div class="left">
                  <h3>Temperature</h3>
                  <div>
                    <span>Max: <strong>${roomData.t_max}</strong></span>
                    <span>Min: <strong>${roomData.t_min}</strong></span>
                    <span>Avg: <strong>${(parseFloat(roomData.t_min) + parseFloat(roomData.t_max)) / 2}</strong></span>
                  </div>
                </div>
              </div>
            </div>
            <div class="humidity">
              <div class="middle">
                <div class="left">
                  <h3>Humidity</h3>
                  <div>
                    <span>Max: <strong>${roomData.h_max}</strong></span>
                    <span>Min: <strong>${roomData.h_min}</strong></span>
                    <span>Avg: <strong>${(parseFloat(roomData.h_min) + parseFloat(roomData.h_max)) / 2}</strong></span>
                  </div>
                </div>
              </div>
            </div>
            <div class="pressure">
              <div class="middle">
                <div class="left">
                  <h3>Gas level</h3>
                  <div>
                    <span>Max: <strong>${roomData.g_max}</strong></span>
                    <span>Min: <strong>${roomData.g_min}</strong></span>
                    <span>Avg: <strong>${(parseFloat(roomData.g_min) + parseFloat(roomData.g_max)) / 2}</strong></span>
                  </div>
                </div>
              </div>
            </div>
            <div class="altitude">
              <div class="middle">
                <div class="left">
                  <h3>O<sub>2</sub> level</h3>
                  <div>
                    <span>Max: <strong>${roomData.o_max}</strong></span>
                    <span>Min: <strong>${roomData.o_min}</strong></span>
                    <span>Avg: <strong>${(parseFloat(roomData.o_min) + parseFloat(roomData.o_max)) / 2}</strong></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
        container.appendChild(box);
      }

      function renderNoData() {
        container.innerHTML = '<p>No weekly data available.</p>';
      }

      fetch(`${API_BASE}/api/room-daily-range?room=${room}&days=7&_ts=${Date.now()}`, { cache: 'no-store' })
        .then(response => response.json())
        .then(data => {
          if (!data || data.error || !data.length) {
            throw new Error(data && data.error ? data.error : 'No data');
          }
          container.innerHTML = '';
          data.forEach(renderBox);
        })
        .catch(error => {
          console.error('Error fetching data:', error);
          renderNoData();
        });
    };

    function formatDate(date) {
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      return date.toLocaleDateString('en-US', options);
    }
  </script>
</body>

</html>
