<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 1</title>
    <script src="http://localhost:4115/config.js"></script>
    <link rel="stylesheet" href="./dailystyle.css">
</head>
<body>
    <table class="content-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Temperature</th>
            <th>Humidity</th>
            <th>Gas Level</th>
            <th>Oxygen Level</th>
          </tr>
        </thead>
        <tbody id="data-body">
          <!-- Data will be populated here -->
        </tbody>
    </table>

    <script>
        const API_BASE = window.__API_BASE_URL__ || 'http://localhost:4115';
        fetch(`${API_BASE}/api/hour-data?room_no=room1&timestamp=2024-03-28&_ts=${Date.now()}`, { cache: 'no-store' })
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('data-body');

                if (!data || data.error) {
                    throw new Error(data && data.error ? data.error : 'No data');
                }

                data.forEach(entry => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${entry.last_updated}</td>
                        <td>${entry.t_max}</td>
                        <td>${entry.h_max}</td>
                        <td>${entry.g_max}</td>
                        <td>${entry.o_max}</td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                const tbody = document.getElementById('data-body');
                const row = document.createElement('tr');
                row.innerHTML = `<td colspan=\"5\">No data</td>`;
                tbody.appendChild(row);
            });
    </script>
</body>
</html>
