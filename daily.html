<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 1</title>
    <script src="http://localhost:4115/config.js"></script>
    <link rel="stylesheet" href="./dailystyle.css">
</head>
<body>
    <table class="content-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Temperature</th>
            <th>Humidity</th>
            <th>Gas Level</th>
            <th>Oxygen Level</th>
          </tr>
        </thead>
        <tbody id="data-body">
          <!-- Data will be populated here -->
        </tbody>
    </table>

    <script>
        const API_BASE = window.__API_BASE_URL__ || 'http://localhost:4115';
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room') || 'room1';
        const dateParam = params.get('date');

        function renderRows(data) {
            const tbody = document.getElementById('data-body');
            tbody.innerHTML = '';
            data.forEach(entry => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${entry.timestamp}</td>
                    <td>${entry.temperature}</td>
                    <td>${entry.humidity}</td>
                    <td>${entry.gas}</td>
                    <td>${entry.oxygen}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function renderNoData() {
            const tbody = document.getElementById('data-body');
            tbody.innerHTML = '';
            const row = document.createElement('tr');
            row.innerHTML = `<td colspan=\"5\">No data</td>`;
            tbody.appendChild(row);
        }

        function fetchByDate(date) {
            fetch(`${API_BASE}/api/room-history?room=${room}&date=${date}&_ts=${Date.now()}`, { cache: 'no-store' })
                .then(response => response.json())
                .then(data => {
                    if (!data || data.error || data.length === 0) {
                        throw new Error(data && data.error ? data.error : 'No data');
                    }
                    renderRows(data);
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    renderNoData();
                });
        }

        if (dateParam) {
            fetchByDate(dateParam);
        } else {
            fetch(`${API_BASE}/api/latest-room-date?room=${room}&_ts=${Date.now()}`, { cache: 'no-store' })
                .then(response => response.json())
                .then(data => {
                    if (!data || data.error || !data.date) {
                        throw new Error(data && data.error ? data.error : 'No latest date');
                    }
                    fetchByDate(data.date);
                })
                .catch(error => {
                    console.error('Error fetching latest date:', error);
                    renderNoData();
                });
        }
    </script>
</body>
</html>
